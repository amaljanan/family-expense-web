<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a143c"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle top-left highlight -->
  <ellipse cx="90" cy="90" rx="230" ry="230" fill="white" opacity="0.05"/>

  <!--
    ₹ Rupee symbol — clean geometric construction
    Bounding box ~148–364 wide, 140–380 tall, centered at x=256
    Parts: top bar, middle bar, stem, bowl arc, diagonal tail
  -->

  <!-- Top horizontal bar -->
  <rect x="148" y="140" width="216" height="46" rx="23" fill="white"/>

  <!-- Bowl: semi-circle filling the space from top bar down to middle bar -->
  <!-- Drawn as a stroked arc (P-shape) -->
  <path d="M 186 186
           L 186 276
           A 80 80 0 0 0 280 186
           Z"
        fill="white"/>

  <!-- Middle horizontal bar -->
  <rect x="148" y="232" width="216" height="46" rx="23" fill="white"/>

  <!-- Vertical stem -->
  <rect x="148" y="140" width="50" height="240" rx="12" fill="white"/>

  <!-- Diagonal tail (bottom-right strike of ₹) -->
  <line x1="188" y1="278" x2="370" y2="390"
        stroke="white" stroke-width="48" stroke-linecap="round"/>

</svg>
