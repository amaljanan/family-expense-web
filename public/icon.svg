<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" ry="108" fill="url(#shine)"/>

  <!-- Chimney (drawn first so roof overlaps it) -->
  <rect x="306" y="102" width="46" height="82" rx="6" fill="rgba(255,255,255,0.92)"/>

  <!-- Roof / triangle -->
  <polygon points="256,72 432,218 80,218" fill="rgba(255,255,255,0.95)"/>

  <!-- House walls -->
  <rect x="100" y="210" width="312" height="226" rx="0" fill="rgba(255,255,255,0.95)"/>

  <!-- House interior background -->
  <rect x="122" y="232" width="268" height="204" rx="6" fill="#dbeafe"/>

  <!-- Rupee ₹ symbol — drawn as paths so no font dependency -->
  <!-- Left vertical stem -->
  <rect x="188" y="262" width="22" height="158" rx="5" fill="#1e40af"/>
  <!-- Top horizontal bar (full width) -->
  <rect x="188" y="262" width="148" height="22" rx="5" fill="#1e40af"/>
  <!-- Upper arch fill (P-like bump between bars) -->
  <path d="M 210,284 Q 336,284 336,306 Q 336,328 210,328 L 210,306 Q 308,306 308,306 Q 308,284 210,284 Z" fill="#1e40af"/>
  <!-- Second horizontal bar -->
  <rect x="188" y="318" width="148" height="22" rx="5" fill="#1e40af"/>
  <!-- Diagonal line (bottom-right of ₹) -->
  <line x1="336" y1="350" x2="200" y2="420" stroke="#1e40af" stroke-width="24" stroke-linecap="round"/>

  <!-- Small heart on roof peak to represent family/love -->
  <path d="M 256,108 C 256,108 242,96 234,101 C 226,106 228,118 236,124 L 256,142 L 276,124 C 284,118 286,106 278,101 C 270,96 256,108 256,108 Z"
        fill="#93c5fd" opacity="0.85"/>
</svg>
